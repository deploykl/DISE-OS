<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Matrix Loading Screen | System Initialization</title>
    <!-- Tailwind CSS + Bootstrap Icons + PrimeIcons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/primeicons@7.0.0/primeicons.css">
    <style>
        /* Forma hexagonal */
        .hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        /* Animaciones personalizadas */
        @keyframes typewriter {
            from { width: 0; }
            to { width: 100%; }
        }

        @keyframes cursor-blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        @keyframes glitch {
            0% { transform: translate(0); opacity: 1; }
            20% { transform: translate(-2px, 2px); opacity: 0.75; }
            40% { transform: translate(-2px, -2px); opacity: 0.5; }
            60% { transform: translate(2px, 2px); opacity: 0.75; }
            80% { transform: translate(2px, -2px); opacity: 0.5; }
            100% { transform: translate(0); opacity: 1; }
        }

        @keyframes processor {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.05); filter: brightness(1.3); }
        }

        @keyframes connection-line {
            0% { transform: translateX(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateX(100%); opacity: 0; }
        }

        @keyframes data-dot {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0; }
            10%, 90% { opacity: 1; }
            50% { transform: translateY(-20px) scale(1.5); }
        }

        @keyframes scan-line {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100vh); }
        }

        @keyframes progress-shine {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes console-line {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }

        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes ping-slow {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.2; transform: scale(1.1); }
        }

        /* Clases de animación */
        .animate-typewriter {
            animation: typewriter 2s steps(40) 1s both;
            border-right: 2px solid;
            border-color: inherit;
            white-space: nowrap;
            overflow: hidden;
            display: inline-block;
        }

        .animate-cursor-blink {
            animation: cursor-blink 1s infinite;
        }

        .animate-glitch {
            animation: glitch 0.3s infinite;
        }

        .animate-processor {
            animation: processor 2s ease-in-out infinite;
        }

        .animate-connection-line {
            animation: connection-line linear infinite;
        }

        .animate-data-dot {
            animation: data-dot ease-in-out infinite;
        }

        .animate-scan-line {
            animation: scan-line 3s linear infinite;
        }

        .animate-progress-shine {
            animation: progress-shine 2s ease-in-out infinite;
        }

        .animate-console-line {
            animation: console-line 0.5s ease-out both;
        }

        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }

        .animate-ping-slow {
            animation: ping-slow 3s ease-in-out infinite;
        }

        .animate-fade-in-delay {
            animation: fade-in 0.8s ease-out 0.5s both;
        }

        .animate-pulse-slow {
            animation: pulse-slow 4s ease-in-out infinite;
        }

        /* Transición de desvanecimiento */
        .fade-enter-active,
        .fade-leave-active {
            transition: all 0.8s ease;
        }

        .fade-enter-from,
        .fade-leave-to {
            opacity: 0;
            transform: scale(1.05);
        }

        /* Ocultar elementos durante transición */
        .hidden-transition {
            display: none;
        }
    </style>
</head>
<body class="antialiased">

    <div id="app"></div>

    <script>
        class MatrixLoadingScreen {
            constructor(config) {
                this.show = config.show || false;
                this.duration = config.duration || 6000;
                this.theme = config.theme || 'matrix';
                this.onComplete = config.onComplete || (() => {});
                
                this.countdown = Math.ceil(this.duration / 1000);
                this.internalShow = false;
                this.elapsedTime = 0;
                
                this.matrixInterval = null;
                this.countdownInterval = null;
                this.columns = [];
                this.startTime = 0;
                
                this.container = null;
                this.canvas = null;
                
                this.init();
            }
            
            get themeClasses() {
                if (this.theme === 'light') {
                    return {
                        background: 'bg-gradient-to-br from-slate-50 to-blue-100',
                        text: 'text-slate-800',
                        title: 'text-slate-900',
                        subtitle: 'text-blue-600',
                        connectionLine: 'bg-blue-300/60',
                        dataDot: 'bg-blue-400',
                        glitch1: 'bg-red-300/30',
                        glitch2: 'bg-blue-300/30',
                        logoBorder: 'bg-white/90 border-blue-300/50',
                        logoBg: 'bg-blue-200',
                        logoIcon: 'text-blue-600',
                        logoRing: 'border-blue-400',
                        progressBorder: 'border-blue-300 bg-blue-100/50',
                        progressBar: 'bg-gradient-to-r from-blue-500 to-cyan-500',
                        progressShine: 'bg-gradient-to-r from-transparent via-white/40 to-transparent',
                        counter: 'text-blue-700',
                        consoleBorder: 'border-blue-200/30 bg-blue-50/30',
                        statusText: 'text-blue-800',
                        footer: 'text-blue-600'
                    };
                } else if (this.theme === 'matrix') {
                    return {
                        background: 'bg-gradient-to-br from-black via-green-900/20 to-black',
                        text: 'text-white',
                        title: 'text-green-400',
                        subtitle: 'text-cyan-300',
                        connectionLine: 'bg-green-400/40',
                        dataDot: 'bg-cyan-400',
                        glitch1: 'bg-red-500/20',
                        glitch2: 'bg-cyan-500/20',
                        logoBorder: 'bg-black/40 border-green-400/30',
                        logoBg: 'bg-green-500/10',
                        logoIcon: 'text-green-400',
                        logoRing: 'border-cyan-400',
                        progressBorder: 'border-green-500/50 bg-green-900/20',
                        progressBar: 'bg-gradient-to-r from-green-400 to-cyan-400',
                        progressShine: 'bg-gradient-to-r from-transparent via-green-200/40 to-transparent',
                        counter: 'text-green-300',
                        consoleBorder: 'border-green-500/30 bg-green-900/10',
                        statusText: 'text-green-200',
                        footer: 'text-green-400/70'
                    };
                } else {
                    return {
                        background: 'bg-gradient-to-br from-slate-900 to-indigo-900',
                        text: 'text-white',
                        title: 'text-blue-300',
                        subtitle: 'text-cyan-300',
                        connectionLine: 'bg-blue-400/40',
                        dataDot: 'bg-cyan-400',
                        glitch1: 'bg-purple-500/20',
                        glitch2: 'bg-cyan-500/20',
                        logoBorder: 'bg-white/5 border-white/20',
                        logoBg: 'bg-blue-400/10',
                        logoIcon: 'text-blue-300',
                        logoRing: 'border-cyan-300',
                        progressBorder: 'border-blue-400/50 bg-blue-900/20',
                        progressBar: 'bg-gradient-to-r from-blue-400 to-cyan-400',
                        progressShine: 'bg-gradient-to-r from-transparent via-blue-200/40 to-transparent',
                        counter: 'text-blue-200',
                        consoleBorder: 'border-blue-400/30 bg-blue-900/10',
                        statusText: 'text-blue-100',
                        footer: 'text-blue-300/70'
                    };
                }
            }
            
            get progressWidth() {
                if (this.duration === 0) return 0;
                return Math.min((this.elapsedTime / this.duration) * 100, 100);
            }
            
            init() {
                this.render();
                if (this.show) {
                    this.showLoading();
                }
            }
            
            render() {
                const app = document.getElementById('app');
                const classes = this.themeClasses;
                const canvasOpacity = this.theme === 'dark' ? 0.8 : (this.theme === 'matrix' ? 0.8 : 0.4);
                
                // Generar líneas de conexión dinámicas
                let connectionLines = '';
                for (let i = 0; i < 20; i++) {
                    const top = Math.random() * 100;
                    const left = Math.random() * 100;
                    const width = Math.random() * 200 + 50;
                    const delay = Math.random() * 5;
                    const duration = Math.random() * 3 + 2;
                    connectionLines += `<div class="absolute h-0.5 animate-connection-line ${classes.connectionLine}" style="top: ${top}%; left: ${left}%; width: ${width}px; animation-delay: ${delay}s; animation-duration: ${duration}s;"></div>`;
                }
                
                // Generar puntos de datos flotantes
                let dataDots = '';
                for (let i = 0; i < 15; i++) {
                    const top = Math.random() * 100;
                    const left = Math.random() * 100;
                    const delay = Math.random() * 8;
                    const duration = Math.random() * 10 + 5;
                    dataDots += `<div class="absolute w-1 h-1 rounded-full animate-data-dot ${classes.dataDot}" style="top: ${top}%; left: ${left}%; animation-delay: ${delay}s; animation-duration: ${duration}s;"></div>`;
                }
                
                this.container = document.createElement('div');
                this.container.className = `fixed inset-0 z-[9999] flex items-center justify-center overflow-hidden transition-all duration-800 ${classes.background}`;
                this.container.style.transition = 'all 0.8s ease';
                
                if (!this.internalShow) {
                    this.container.style.opacity = '0';
                    this.container.style.transform = 'scale(1.05)';
                    this.container.style.pointerEvents = 'none';
                }
                
                this.container.innerHTML = `
                    <canvas class="absolute inset-0 w-full h-full pointer-events-none" style="opacity: ${canvasOpacity};"></canvas>
                    
                    <div class="absolute inset-0 overflow-hidden">
                        ${connectionLines}
                        ${dataDots}
                    </div>
                    
                    <div class="absolute inset-0 overflow-hidden">
                        <div class="absolute w-full h-1 bg-gradient-to-r from-transparent via-green-400 to-transparent animate-scan-line opacity-70"></div>
                    </div>
                    
                    <div class="relative z-10 text-center space-y-8 max-w-2xl mx-auto px-4 ${classes.text}">
                        <div class="relative mx-auto w-40 h-40">
                            <div class="absolute inset-0 hexagon animate-glitch opacity-70 ${classes.glitch1}" style="transform: translate(-2px, 0);"></div>
                            <div class="absolute inset-0 hexagon animate-glitch opacity-70 ${classes.glitch2}" style="transform: translate(2px, 0); animation-delay: 0.1s;"></div>
                            
                            <div class="relative hexagon overflow-hidden backdrop-blur-lg border-2 flex items-center justify-center ${classes.logoBorder}">
                                <div class="absolute inset-0 opacity-20 animate-pulse-slow ${classes.logoBg}"></div>
                                <div class="relative z-10">
                                    <i class="bi bi-cpu text-5xl animate-processor ${classes.logoIcon}"></i>
                                    <div class="absolute -inset-4 rounded-full border-2 border-dashed animate-spin-slow opacity-30 ${classes.logoRing}"></div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="space-y-6">
                            <div class="relative">
                                <h1 class="text-5xl md:text-6xl font-black tracking-tighter animate-typewriter overflow-hidden whitespace-nowrap ${classes.title}">
                                    SYSTEM_INITIALIZATION
                                </h1>
                                <div class="absolute bottom-0 right-0 w-0.5 h-8 bg-green-400 animate-cursor-blink"></div>
                            </div>
                            <p class="text-xl font-mono animate-fade-in-delay tracking-wider ${classes.subtitle}">
                                > LOADING_USER_EXPERIENCE_MODULES...
                            </p>
                        </div>
                        
                        <div class="w-full max-w-md mx-auto space-y-6">
                            <div class="relative">
                                <div class="w-full h-3 rounded-sm overflow-hidden border ${classes.progressBorder}">
                                    <div class="h-full transition-all duration-100 ease-linear relative ${classes.progressBar}" style="width: 0%;">
                                        <div class="absolute inset-0 animate-progress-shine ${classes.progressShine}"></div>
                                    </div>
                                </div>
                                <div class="flex justify-between text-xs mt-1 font-mono ${classes.counter}">
                                    <span>0%</span>
                                    <span>25%</span>
                                    <span>50%</span>
                                    <span>75%</span>
                                    <span>100%</span>
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-center text-sm font-mono px-2 ${classes.counter}">
                                <span class="flex items-center space-x-2">
                                    <span class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></span>
                                    <span>SYSTEM_READY_IN</span>
                                </span>
                                <span class="font-bold tracking-wider countdown-display">${this.countdown}s</span>
                            </div>
                        </div>
                        
                        <div class="space-y-3 text-sm font-mono max-w-lg mx-auto text-left bg-black/20 backdrop-blur-sm rounded-lg p-4 border ${classes.consoleBorder}">
                            <div class="flex items-center space-x-3 animate-console-line ${classes.statusText}">
                                <span class="text-green-400">></span>
                                <i class="pi pi-check text-base text-green-400"></i>
                                <span>USER_AUTHENTICATION_COMPLETE</span>
                            </div>
                            <div class="flex items-center space-x-3 animate-console-line ${classes.statusText}" style="animation-delay: 0.3s;">
                                <span class="text-green-400">></span>
                                <i class="pi pi-cog animate-spin text-base text-cyan-400"></i>
                                <span>LOADING_SECURITY_MODULES_[##########]</span>
                            </div>
                            <div class="flex items-center space-x-3 animate-console-line ${classes.statusText}" style="animation-delay: 0.6s;">
                                <span class="text-green-400">></span>
                                <i class="pi pi-database text-base text-blue-400"></i>
                                <span>DATABASE_CONNECTION_ESTABLISHED</span>
                            </div>
                            <div class="flex items-center space-x-3 animate-console-line ${classes.statusText}" style="animation-delay: 0.9s;">
                                <span class="text-green-400">></span>
                                <i class="pi pi-shield text-base text-amber-400"></i>
                                <span>ENCRYPTION_PROTOCOLS_ACTIVE</span>
                            </div>
                            <div class="flex items-center space-x-3 animate-console-line ${classes.statusText}" style="animation-delay: 1.2s;">
                                <span class="text-green-400">></span>
                                <i class="pi pi-bolt text-base text-purple-400"></i>
                                <span>SYSTEM_OPTIMIZATION_IN_PROGRESS</span>
                            </div>
                        </div>
                        
                        <div class="text-xs font-mono opacity-70 animate-fade-in-delay ${classes.footer}">
                            <div class="flex justify-center space-x-6">
                                <span>VERSION: 2.4.1</span>
                                <span>BUILD: 7842A</span>
                                <span>STATUS: SECURE</span>
                            </div>
                        </div>
                    </div>
                `;
                
                this.canvas = this.container.querySelector('canvas');
                app.appendChild(this.container);
                
                // Guardar referencias
                this.progressBar = this.container.querySelector('.h-full.transition-all');
                this.countdownSpan = this.container.querySelector('.countdown-display');
            }
            
            initializeMatrix() {
                if (!this.canvas) return;
                
                const canvas = this.canvas;
                const ctx = canvas.getContext('2d');
                if (!ctx) return;
                
                canvas.height = window.innerHeight;
                canvas.width = window.innerWidth;
                
                ctx.font = '16px "Courier New", monospace';
                ctx.textBaseline = 'top';
                
                const columnCount = Math.floor(canvas.width / 10);
                this.columns = Array(columnCount).fill(0);
                
                if (this.matrixInterval) {
                    clearInterval(this.matrixInterval);
                }
                
                const colors = this.theme === 'matrix' ? ['#00ff00', '#00cc00', '#009900', '#00ff88', '#00ffcc'] :
                              this.theme === 'dark' ? ['#4facfe', '#00f2fe', '#00ffcc', '#4facfe', '#00f2fe'] :
                              ['#0066cc', '#0088ff', '#00aaff', '#00ccff', '#00eeff'];
                
                const charSet = "01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン";
                
                this.matrixInterval = setInterval(() => {
                    if (!ctx || !this.internalShow) return;
                    
                    ctx.fillStyle = this.theme === 'matrix' ? 'rgba(0, 0, 0, 0.05)' : 
                                    this.theme === 'dark' ? 'rgba(0, 0, 10, 0.05)' : 'rgba(255, 255, 255, 0.03)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    
                    this.columns.forEach((y, index) => {
                        const character = charSet[Math.floor(Math.random() * charSet.length)] || '0';
                        ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)] || '#00ff00';
                        ctx.fillText(character, index * 10, y);
                        
                        if (y > canvas.height && Math.random() > 0.975) {
                            this.columns[index] = 0;
                        } else {
                            this.columns[index] = y + 10;
                        }
                    });
                }, 33);
            }
            
            startCountdown() {
                this.startTime = Date.now();
                this.elapsedTime = 0;
                
                this.countdownInterval = setInterval(() => {
                    const currentTime = Date.now();
                    this.elapsedTime = currentTime - this.startTime;
                    this.countdown = Math.max(0, Math.ceil((this.duration - this.elapsedTime) / 1000));
                    
                    if (this.countdownSpan) {
                        this.countdownSpan.textContent = `${this.countdown}s`;
                    }
                    
                    if (this.progressBar) {
                        this.progressBar.style.width = `${this.progressWidth}%`;
                    }
                    
                    if (this.elapsedTime >= this.duration) {
                        this.cleanup();
                        this.internalShow = false;
                        this.startExitAnimation();
                    }
                }, 50);
            }
            
            startExitAnimation() {
                if (this.container) {
                    this.container.style.opacity = '0';
                    this.container.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        this.container.style.pointerEvents = 'none';
                        this.onComplete();
                    }, 800);
                }
            }
            
            cleanup() {
                if (this.countdownInterval) {
                    clearInterval(this.countdownInterval);
                    this.countdownInterval = null;
                }
                if (this.matrixInterval) {
                    clearInterval(this.matrixInterval);
                    this.matrixInterval = null;
                }
                if (this.canvas) {
                    const ctx = this.canvas.getContext('2d');
                    if (ctx) {
                        ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                    }
                }
                this.elapsedTime = 0;
            }
            
            showLoading() {
                this.cleanup();
                this.internalShow = true;
                this.countdown = Math.ceil(this.duration / 1000);
                this.elapsedTime = 0;
                
                if (this.container) {
                    this.container.style.opacity = '1';
                    this.container.style.transform = 'scale(1)';
                    this.container.style.pointerEvents = 'auto';
                    
                    if (this.progressBar) this.progressBar.style.width = '0%';
                    if (this.countdownSpan) this.countdownSpan.textContent = `${this.countdown}s`;
                }
                
                setTimeout(() => {
                    this.initializeMatrix();
                    this.startCountdown();
                }, 100);
            }
            
            hide() {
                if (this.internalShow) {
                    this.startExitAnimation();
                }
            }
            
            destroy() {
                this.cleanup();
                if (this.container && this.container.parentNode) {
                    this.container.parentNode.removeChild(this.container);
                }
            }
            
            handleResize = () => {
                if (this.internalShow && this.canvas) {
                    this.initializeMatrix();
                }
            }
        }
        
        // Inicializar la pantalla de carga
        const loadingScreen = new MatrixLoadingScreen({
            show: true,
            duration: 6000,
            theme: 'matrix', // 'matrix', 'dark', o 'light'
            onComplete: () => {
                console.log('✅ System ready - Loading complete');
                // Mostrar mensaje de finalización
                const completeMsg = document.createElement('div');
                completeMsg.className = 'fixed inset-0 flex items-center justify-center bg-gradient-to-br from-green-900 to-black z-50';
                completeMsg.innerHTML = `
                    <div class="text-center text-white">
                        <i class="bi bi-check-circle-fill text-6xl text-green-400 mb-4"></i>
                        <h1 class="text-4xl font-bold font-mono">SYSTEM READY</h1>
                        <p class="mt-4 text-green-300 font-mono">> INITIALIZATION_COMPLETE</p>
                        <p class="mt-2 text-sm text-green-500/70">Redirigiendo al dashboard...</p>
                    </div>
                `;
                document.body.appendChild(completeMsg);
                setTimeout(() => {
                    completeMsg.style.opacity = '0';
                    completeMsg.style.transition = 'opacity 0.5s';
                    setTimeout(() => completeMsg.remove(), 500);
                }, 2000);
            }
        });
        
        window.addEventListener('resize', () => loadingScreen.handleResize());
    </script>
</body>
</html>
