<!DOCTYPE html>
<html data-theme="dark" lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>20 Dashboard Design Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Roboto:wght@300;400;500;700&family=Orbitron:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Fira+Code:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500;600;700;800&family=Raleway:wght@300;400;500;600;700;800&family=Work+Sans:wght@300;400;500;600;700&family=Fredoka+One&family=Sora:wght@300;400;500;600;700&family=Karla:wght@300;400;500;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Exo+2:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* === RESET & BASE === */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--t:.28s ease}
body{padding:24px 20px;min-height:100vh;transition:background var(--t),color var(--t)}
[data-theme="dark"] body{background:#09090B;color:#F4F4F5}
[data-theme="light"] body{background:#F0F4F8;color:#1E293B}

/* === THEME TOGGLE === */
.toggle-wrap{position:fixed;top:18px;right:20px;z-index:9999}
.theme-btn{
  display:flex;align-items:center;gap:8px;padding:9px 18px;
  border:none;border-radius:999px;cursor:pointer;
  font-size:.82rem;font-weight:700;letter-spacing:.04em;
  transition:all .2s;font-family:inherit;
}
.theme-btn:hover{transform:scale(1.05)}
[data-theme="dark"] .theme-btn{background:#27272A;color:#F4F4F5;box-shadow:0 4px 16px rgba(0,0,0,.5)}
[data-theme="light"] .theme-btn{background:#1E293B;color:#F8FAFC;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.theme-btn svg{width:15px;height:15px;flex-shrink:0}

/* === PAGE TITLE === */
.pg-title{
  text-align:center;font-size:1.4rem;font-weight:800;
  margin-bottom:28px;letter-spacing:.03em;
  padding-right:80px;
}
[data-theme="dark"] .pg-title{color:#E2E8F0}
[data-theme="light"] .pg-title{color:#0F172A}

/* === ROW BASE === */
.dr{
  display:grid;
  grid-template-columns:215px 1fr 1fr 1fr 1fr;
  gap:13px;margin-bottom:18px;padding:18px;
  align-items:center;transition:background var(--t),border-color var(--t);
}
.rl{
  grid-column:1/-1;font-size:.58rem;font-weight:700;
  letter-spacing:.2em;text-transform:uppercase;
  margin-bottom:-2px;opacity:.35;
}
[data-theme="dark"] .rl{color:#fff}
[data-theme="light"] .rl{color:#000}

/* === CARD BASE === */
.sc{
  height:185px;padding:18px;display:flex;flex-direction:column;
  justify-content:space-between;position:relative;overflow:hidden;
  cursor:pointer;transition:transform .18s;
}
.sc:hover{transform:translateY(-2px)}
.sc .lb{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;opacity:.6}
.sc .vl{font-size:1.85rem;font-weight:800;line-height:1.05;letter-spacing:-.02em}
.sc .sb{font-size:.73rem;opacity:.55}
.sc .bd{
  display:inline-flex;align-items:center;gap:3px;
  padding:3px 9px;border-radius:999px;
  font-size:.68rem;font-weight:700;width:fit-content;
}
.bu{background:rgba(34,197,94,.15);color:#86EFAC}
.bd2{background:rgba(239,68,68,.15);color:#FCA5A5}
[data-theme="light"] .bu{background:rgba(21,128,61,.12);color:#166534}
[data-theme="light"] .bd2{background:rgba(185,28,28,.12);color:#991B1B}
.sc .ic{
  position:absolute;top:14px;right:14px;
  width:36px;height:36px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
}
.sc .ic svg{width:19px;height:19px}

/* === CHART BOX BASE === */
.cb{
  height:185px;padding:11px 13px;
  display:flex;flex-direction:column;
  transition:background var(--t),border-color var(--t);
}
.cb .ct{
  font-size:.62rem;font-weight:700;letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:7px;opacity:.55;
}
.cb canvas{flex:1;min-height:0}

/* ================================================================
   DESIGN 01 — GLASSMORPHISM · Inter
================================================================ */
.d1{font-family:'Inter',sans-serif;border-radius:22px}
[data-theme="dark"] .d1{
  background:radial-gradient(ellipse at 15% 50%,rgba(99,102,241,.18)0%,transparent 55%),
             radial-gradient(ellipse at 85% 50%,rgba(139,92,246,.14)0%,transparent 55%),#0F172A;
}
[data-theme="light"] .d1{
  background:radial-gradient(ellipse at 15% 50%,rgba(199,210,254,.7)0%,transparent 55%),
             radial-gradient(ellipse at 85% 50%,rgba(221,214,254,.6)0%,transparent 55%),#EEF2FF;
}
[data-theme="dark"] .d1 .sc{
  background:rgba(255,255,255,.07);backdrop-filter:blur(22px) saturate(1.5);
  border:1px solid rgba(255,255,255,.12);border-radius:16px;color:#EEF2FF;
}
[data-theme="light"] .d1 .sc{
  background:rgba(255,255,255,.72);backdrop-filter:blur(22px) saturate(1.5);
  border:1px solid rgba(255,255,255,.9);border-radius:16px;color:#1E1B4B;
  box-shadow:0 8px 32px rgba(99,102,241,.1);
}
[data-theme="dark"] .d1 .ic{background:rgba(99,102,241,.2);color:#A5B4FC}
[data-theme="light"] .d1 .ic{background:rgba(99,102,241,.1);color:#4F46E5}
[data-theme="dark"] .d1 .cb{
  background:rgba(255,255,255,.05);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.08);border-radius:14px;color:#C7D2FE;
}
[data-theme="light"] .d1 .cb{
  background:rgba(255,255,255,.65);backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.85);border-radius:14px;color:#4338CA;
}

/* ================================================================
   DESIGN 02 — NEUMORPHISM · Poppins
================================================================ */
.d2{font-family:'Poppins',sans-serif;border-radius:22px}
[data-theme="dark"] .d2{background:#1C1F2E}
[data-theme="light"] .d2{background:#E0E5F0}
[data-theme="dark"] .d2 .sc{
  background:#1C1F2E;
  box-shadow:9px 9px 22px #11131C,-9px -9px 22px #272B40;
  border-radius:18px;color:#CBD5E1;border:none;
}
[data-theme="light"] .d2 .sc{
  background:#E0E5F0;
  box-shadow:9px 9px 18px #B8BDCC,-9px -9px 18px #FFFFFF;
  border-radius:18px;color:#1E293B;border:none;
}
[data-theme="dark"] .d2 .ic{
  background:#1C1F2E;
  box-shadow:4px 4px 8px #11131C,-4px -4px 8px #272B40;
  color:#A78BFA;border-radius:10px;
}
[data-theme="light"] .d2 .ic{
  background:#E0E5F0;
  box-shadow:4px 4px 8px #B8BDCC,-4px -4px 8px #FFFFFF;
  color:#7C3AED;border-radius:10px;
}
[data-theme="dark"] .d2 .cb{
  background:#1C1F2E;border:none;
  box-shadow:inset 5px 5px 10px #11131C,inset -5px -5px 10px #272B40;
  border-radius:14px;color:#A78BFA;
}
[data-theme="light"] .d2 .cb{
  background:#E0E5F0;border:none;
  box-shadow:inset 5px 5px 10px #B8BDCC,inset -5px -5px 10px #FFFFFF;
  border-radius:14px;color:#5B21B6;
}

/* ================================================================
   DESIGN 03 — BRUTALISM · Space Grotesk
================================================================ */
.d3{font-family:'Space Grotesk',sans-serif;border-radius:0;border:3px solid}
[data-theme="dark"] .d3{background:#09090B;border-color:#FDE047}
[data-theme="light"] .d3{background:#FFFEF0;border-color:#000}
[data-theme="dark"] .d3 .sc{
  background:#000;border:3px solid #FDE047;
  box-shadow:5px 5px 0 #FDE047;border-radius:0;color:#FEF9C3;
}
[data-theme="light"] .d3 .sc{
  background:#FEF9C3;border:3px solid #000;
  box-shadow:5px 5px 0 #000;border-radius:0;color:#09090B;
}
[data-theme="dark"] .d3 .ic{background:#FDE047;color:#000;border-radius:0}
[data-theme="light"] .d3 .ic{background:#000;color:#FDE047;border-radius:0}
[data-theme="dark"] .d3 .vl{color:#FDE047;font-size:2rem}
[data-theme="light"] .d3 .vl{color:#000;font-size:2rem}
[data-theme="dark"] .d3 .cb{
  background:#000;border:3px solid #FDE047;
  box-shadow:4px 4px 0 #FDE047;border-radius:0;color:#FDE047;
}
[data-theme="light"] .d3 .cb{
  background:#FFFEF0;border:3px solid #000;
  box-shadow:4px 4px 0 #000;border-radius:0;color:#09090B;
}

/* ================================================================
   DESIGN 04 — MATERIAL YOU · Roboto
================================================================ */
.d4{font-family:'Roboto',sans-serif;border-radius:28px}
[data-theme="dark"] .d4{background:#1C1B1F}
[data-theme="light"] .d4{background:#FFFBFE}
[data-theme="dark"] .d4 .sc{
  background:#2B2930;border:1px solid rgba(208,188,255,.2);
  border-radius:28px;color:#E6E1E5;
}
[data-theme="light"] .d4 .sc{
  background:#EADDFF;border:1px solid rgba(103,80,164,.12);
  border-radius:28px;color:#21005D;
  box-shadow:0 2px 12px rgba(103,80,164,.12);
}
[data-theme="dark"] .d4 .ic{background:rgba(208,188,255,.1);color:#D0BCFF;border-radius:18px}
[data-theme="light"] .d4 .ic{background:rgba(103,80,164,.1);color:#6750A4;border-radius:18px}
[data-theme="dark"] .d4 .cb{
  background:#2B2930;border:1px solid rgba(208,188,255,.18);
  border-radius:24px;color:#CCC2DC;
}
[data-theme="light"] .d4 .cb{
  background:#F6EDFF;border:1px solid rgba(103,80,164,.1);
  border-radius:24px;color:#4A4458;
}

/* ================================================================
   DESIGN 05 — CYBERPUNK NEON · Orbitron
================================================================ */
.d5{font-family:'Orbitron',monospace;border-radius:4px;position:relative;overflow:hidden}
.d5::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(34,211,238,.025)3px,rgba(34,211,238,.025)4px);
}
[data-theme="dark"] .d5{background:#000;border:1px solid rgba(34,211,238,.35)}
[data-theme="light"] .d5{background:#020C14;border:1px solid rgba(34,211,238,.45)}
.d5 .sc,.d5[data-theme] .sc{
  background:rgba(0,0,0,.85);border:1px solid #22D3EE;
  box-shadow:0 0 14px rgba(34,211,238,.25),inset 0 0 24px rgba(34,211,238,.04);
  border-radius:4px;color:#E0FFFF;position:relative;z-index:1;
}
[data-theme="dark"] .d5 .sc,[data-theme="light"] .d5 .sc{
  background:rgba(0,10,20,.9);border:1px solid #22D3EE;
  box-shadow:0 0 14px rgba(34,211,238,.25),inset 0 0 24px rgba(34,211,238,.04);
  border-radius:4px;color:#E0FFFF;
}
.d5 .ic{background:rgba(34,211,238,.08);color:#22D3EE;border-radius:2px}
.d5 .vl{color:#22D3EE;text-shadow:0 0 12px rgba(34,211,238,.7)}
[data-theme="dark"] .d5 .cb,[data-theme="light"] .d5 .cb{
  background:rgba(0,10,20,.8);border:1px solid rgba(34,211,238,.35);
  box-shadow:0 0 8px rgba(34,211,238,.12);border-radius:4px;color:#67E8F9;
  position:relative;z-index:1;
}

/* ================================================================
   DESIGN 06 — LUXURY MINIMAL · Playfair Display
================================================================ */
.d6{font-family:'Playfair Display',serif;border-radius:6px}
[data-theme="dark"] .d6{background:#0D0B08;border:1px solid #C9A227}
[data-theme="light"] .d6{background:#FDFAF2;border:1px solid #C9A227}
[data-theme="dark"] .d6 .sc{
  background:#18140C;border:1px solid #B8960C;border-radius:4px;color:#FEF3C7;
}
[data-theme="light"] .d6 .sc{
  background:#FFFFF5;border:1px solid #C9A227;border-radius:4px;color:#44300A;
  box-shadow:0 4px 24px rgba(201,162,39,.08);
}
[data-theme="dark"] .d6 .ic{background:rgba(201,162,39,.1);color:#C9A227;border-radius:2px}
[data-theme="light"] .d6 .ic{background:rgba(201,162,39,.08);color:#92701A;border-radius:2px}
[data-theme="dark"] .d6 .vl{font-style:italic;color:#F0C244}
[data-theme="light"] .d6 .vl{font-style:italic;color:#7A5212}
[data-theme="dark"] .d6 .cb{
  background:#18140C;border:1px solid rgba(184,150,12,.28);border-radius:4px;color:#F0C244;
}
[data-theme="light"] .d6 .cb{
  background:#FFFFFA;border:1px solid rgba(201,162,39,.22);border-radius:4px;color:#7A5212;
}

/* ================================================================
   DESIGN 07 — TERMINAL · Fira Code
================================================================ */
.d7{font-family:'Fira Code',monospace;border-radius:10px}
[data-theme="dark"] .d7{background:#0D1117;border:1px solid #30363D}
[data-theme="light"] .d7{background:#F6F8FA;border:1px solid #D0D7DE}
[data-theme="dark"] .d7 .sc{
  background:#161B22;border:1px solid #30363D;border-radius:8px;color:#E6EDF3;
}
[data-theme="light"] .d7 .sc{
  background:#FFF;border:1px solid #D0D7DE;border-radius:8px;color:#1F2328;
}
.d7 .sc::before{
  content:'● ● ●';position:absolute;top:10px;left:13px;
  font-size:7px;letter-spacing:4px;font-family:'Fira Code',monospace;
}
[data-theme="dark"] .d7 .sc::before{color:#3FB950}
[data-theme="light"] .d7 .sc::before{color:#26A13B}
.d7 .sc .lb{margin-top:14px}
[data-theme="dark"] .d7 .ic{background:rgba(63,185,80,.1);color:#3FB950;border-radius:4px}
[data-theme="light"] .d7 .ic{background:rgba(38,160,59,.08);color:#1A7F37;border-radius:4px}
[data-theme="dark"] .d7 .vl{color:#3FB950;font-size:1.7rem}
[data-theme="light"] .d7 .vl{color:#1A7F37;font-size:1.7rem}
[data-theme="dark"] .d7 .cb{
  background:#161B22;border:1px solid #30363D;border-radius:8px;color:#3FB950;
}
[data-theme="light"] .d7 .cb{
  background:#FFF;border:1px solid #D0D7DE;border-radius:8px;color:#1A7F37;
}

/* ================================================================
   DESIGN 08 — SOFT CANDY · Nunito
================================================================ */
.d8{font-family:'Nunito',sans-serif;border-radius:26px}
[data-theme="dark"] .d8{background:linear-gradient(135deg,#170A2A 0%,#0A1B3E 100%)}
[data-theme="light"] .d8{background:linear-gradient(135deg,#FEF0FB 0%,#EFF2FF 100%)}
[data-theme="dark"] .d8 .sc{
  background:linear-gradient(145deg,#2A1552,#182B58);border:none;
  border-radius:26px;color:#F0E6FF;
  box-shadow:0 10px 40px rgba(168,85,247,.2);
}
[data-theme="light"] .d8 .sc{
  background:linear-gradient(145deg,#FFE4F8,#E4EEFF);border:none;
  border-radius:26px;color:#3A1C5F;
  box-shadow:0 8px 32px rgba(168,85,247,.12);
}
[data-theme="dark"] .d8 .ic{background:rgba(244,114,182,.2);color:#F9A8D4;border-radius:16px}
[data-theme="light"] .d8 .ic{background:rgba(244,114,182,.15);color:#DB2777;border-radius:16px}
[data-theme="dark"] .d8 .cb{
  background:rgba(255,255,255,.06);border:1.5px solid rgba(244,114,182,.2);
  border-radius:20px;color:#F9A8D4;
}
[data-theme="light"] .d8 .cb{
  background:rgba(255,255,255,.75);border:1.5px solid rgba(244,114,182,.18);
  border-radius:20px;color:#9333EA;
}

/* ================================================================
   DESIGN 09 — CORPORATE IBM · IBM Plex Sans
================================================================ */
.d9{font-family:'IBM Plex Sans',sans-serif;border-radius:0}
[data-theme="dark"] .d9{background:#161616;border-left:4px solid #0F62FE}
[data-theme="light"] .d9{background:#F4F4F4;border-left:4px solid #0F62FE}
[data-theme="dark"] .d9 .sc{
  background:#262626;border:none;border-top:3px solid #0F62FE;
  border-radius:0;color:#F4F4F4;
}
[data-theme="light"] .d9 .sc{
  background:#FFF;border:none;border-top:3px solid #0F62FE;
  border-radius:0;color:#161616;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
[data-theme="dark"] .d9 .ic{background:rgba(15,98,254,.15);color:#78A9FF;border-radius:0}
[data-theme="light"] .d9 .ic{background:rgba(15,98,254,.08);color:#0F62FE;border-radius:0}
[data-theme="dark"] .d9 .vl{color:#78A9FF}
[data-theme="light"] .d9 .vl{color:#0043CE}
[data-theme="dark"] .d9 .cb{
  background:#262626;border:none;border-top:2px solid rgba(15,98,254,.4);
  border-radius:0;color:#78A9FF;
}
[data-theme="light"] .d9 .cb{
  background:#FFF;border:none;border-top:2px solid rgba(15,98,254,.25);
  border-radius:0;color:#0043CE;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}

/* ================================================================
   DESIGN 10 — GRADIENT MESH · Montserrat
================================================================ */
.d10{font-family:'Montserrat',sans-serif;border-radius:20px}
[data-theme="dark"] .d10{
  background:
    radial-gradient(at 0% 0%,#1A053380 0,transparent 50%),
    radial-gradient(at 100% 0%,#001B3380 0,transparent 50%),
    radial-gradient(at 100% 100%,#001A1A80 0,transparent 50%),
    radial-gradient(at 0% 100%,#1C053380 0,transparent 50%),#08080F;
}
[data-theme="light"] .d10{
  background:
    radial-gradient(at 0% 0%,#E9D5FF 0,transparent 50%),
    radial-gradient(at 100% 0%,#DBEAFE 0,transparent 50%),
    radial-gradient(at 100% 100%,#CFFAFE 0,transparent 50%),
    radial-gradient(at 0% 100%,#FCE7F3 0,transparent 50%),#F8FAFC;
}
[data-theme="dark"] .d10 .sc{
  background:linear-gradient(135deg,rgba(124,58,237,.75),rgba(6,182,212,.55));
  border:1px solid rgba(255,255,255,.08);border-radius:16px;color:#FFF;
  backdrop-filter:blur(8px);
}
[data-theme="light"] .d10 .sc{
  background:linear-gradient(135deg,#7C3AED,#0EA5E9);border:none;
  border-radius:16px;color:#FFF;box-shadow:0 12px 40px rgba(124,58,237,.28);
}
.d10 .ic{background:rgba(255,255,255,.18);color:#FFF}
[data-theme="dark"] .d10 .cb{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;color:#C4B5FD;
}
[data-theme="light"] .d10 .cb{
  background:rgba(255,255,255,.7);border:1px solid rgba(124,58,237,.1);
  border-radius:14px;color:#5B21B6;
}

/* ================================================================
   DESIGN 11 — AURORA · Raleway
================================================================ */
.d11{font-family:'Raleway',sans-serif;border-radius:20px;position:relative;overflow:hidden}
.d11::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(200deg,rgba(16,185,129,.06)0%,rgba(139,92,246,.05)50%,rgba(6,182,212,.06)100%);
}
[data-theme="dark"] .d11{background:#040E10}
[data-theme="light"] .d11{background:#F0FDF4}
[data-theme="dark"] .d11 .sc{
  background:linear-gradient(155deg,rgba(16,185,129,.12),rgba(139,92,246,.07));
  border:1px solid rgba(16,185,129,.22);border-radius:16px;color:#D1FAE5;
  box-shadow:0 4px 30px rgba(16,185,129,.1),0 0 50px rgba(139,92,246,.06);
}
[data-theme="light"] .d11 .sc{
  background:linear-gradient(155deg,rgba(16,185,129,.07),rgba(139,92,246,.04));
  border:1px solid rgba(16,185,129,.18);border-radius:16px;color:#065F46;
  box-shadow:0 4px 24px rgba(16,185,129,.08);
}
[data-theme="dark"] .d11 .ic{background:rgba(16,185,129,.15);color:#34D399}
[data-theme="light"] .d11 .ic{background:rgba(16,185,129,.1);color:#059669}
[data-theme="dark"] .d11 .cb{
  background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.14);
  border-radius:14px;color:#6EE7B7;
}
[data-theme="light"] .d11 .cb{
  background:rgba(255,255,255,.8);border:1px solid rgba(16,185,129,.14);
  border-radius:14px;color:#047857;
}

/* ================================================================
   DESIGN 12 — SWISS MINIMAL · Work Sans
================================================================ */
.d12{font-family:'Work Sans',sans-serif;border-radius:0}
[data-theme="dark"] .d12{background:#000;border-top:3px solid #EF4444;border-bottom:3px solid #EF4444}
[data-theme="light"] .d12{background:#FFF;border-top:3px solid #EF4444;border-bottom:3px solid #EF4444}
[data-theme="dark"] .d12 .sc{
  background:transparent;border:none;border-bottom:1px solid #222;
  border-radius:0;color:#FFF;padding-left:0;
}
[data-theme="light"] .d12 .sc{
  background:transparent;border:none;border-bottom:1px solid #E5E7EB;
  border-radius:0;color:#000;padding-left:0;
}

function rnd(a,b){return Math.round(Math.random()*(b-a)+a)}

function getTC(n){
  const dark=document.documentElement.dataset.theme==='dark';
  const alwaysDark=n===5;
  const d=dark||alwaysDark;
  return{
    pal:PAL[dark?'dark':'light'][n-1],
    grid:d?'rgba(255,255,255,.07)':'rgba(0,0,0,.07)',
    tick:d?'rgba(255,255,255,.38)':'rgba(0,0,0,.38)',
  };
}

function mkBar(p){
  const lb=['Jan','Feb','Mar','Apr','May','Jun'];
  return{labels:lb,datasets:[{
    data:lb.map(()=>rnd(20,95)),
    backgroundColor:p.slice(0,6).map(c=>c+'BB'),
    borderColor:p.slice(0,6),borderWidth:1,borderRadius:6,
  }]};
}
function mkDonut(p){
  return{labels:['Core','Growth','Support','Other'],datasets:[{
    data:[rnd(30,50),rnd(15,30),rnd(10,20),rnd(5,15)],
    backgroundColor:p.slice(0,4),borderColor:'transparent',borderWidth:0,hoverOffset:6,
  }]};
}
function mkPie(p){
  return{labels:['Direct','Organic','Paid','Social'],datasets:[{
    data:[rnd(25,45),rnd(20,35),rnd(15,25),rnd(5,20)],
    backgroundColor:p.slice(0,4),borderColor:'transparent',borderWidth:0,hoverOffset:6,
  }]};
}
function mkLine(p){
  const lb=['W1','W2','W3','W4','W5','W6','W7','W8'];
  return{labels:lb,datasets:[
    {label:'A',data:lb.map(()=>rnd(30,90)),borderColor:p[0],backgroundColor:p[0]+'22',
     fill:true,tension:.4,borderWidth:2,pointRadius:3,pointBackgroundColor:p[0]},
    {label:'B',data:lb.map(()=>rnd(20,75)),borderColor:p[1]||p[0],backgroundColor:(p[1]||p[0])+'11',
     fill:true,tension:.4,borderWidth:2,pointRadius:3,pointBackgroundColor:p[1]||p[0]},
  ]};
}

function barOpts(g,t){
  return{responsive:true,maintainAspectRatio:false,animation:{duration:500},
    plugins:{legend:{display:false},tooltip:{enabled:true}},
    scales:{
      x:{grid:{color:g},ticks:{color:t,maxTicksLimit:6},border:{display:false}},
      y:{grid:{color:g},ticks:{color:t,maxTicksLimit:4},border:{display:false}},
    }};
}
function ringOpts(t){
  return{responsive:true,maintainAspectRatio:false,animation:{duration:500},
    plugins:{legend:{display:true,position:'right',labels:{color:t,boxWidth:8,padding:5,font:{size:9}}}},
    cutout:'63%'};
}
function pieOpts(t){
  return{responsive:true,maintainAspectRatio:false,animation:{duration:500},
    plugins:{legend:{display:true,position:'right',labels:{color:t,boxWidth:8,padding:5,font:{size:9}}}}};
}

function buildCharts(n){
  const{pal,grid,tick}=getTC(n);
  ['bar','donut','pie','line'].forEach(t=>{
    const id=`${t}-${n}`;
    if(charts[id]){charts[id].destroy();delete charts[id];}
  });
  charts[`bar-${n}`]=new Chart(document.getElementById(`bar-${n}`),
    {type:'bar',data:mkBar(pal),options:barOpts(grid,tick)});
  charts[`donut-${n}`]=new Chart(document.getElementById(`donut-${n}`),
    {type:'doughnut',data:mkDonut(pal),options:ringOpts(tick)});
  charts[`pie-${n}`]=new Chart(document.getElementById(`pie-${n}`),
    {type:'pie',data:mkPie(pal),options:pieOpts(tick)});
  charts[`line-${n}`]=new Chart(document.getElementById(`line-${n}`),
    {type:'line',data:mkLine(pal),options:barOpts(grid,tick)});
}

function rebuildAll(){ROWS.forEach(r=>buildCharts(r.n))}

function toggleTheme(){
  const h=document.documentElement;
  const isDark=h.dataset.theme==='dark';
  h.dataset.theme=isDark?'light':'dark';
  document.getElementById('ico-sun').style.display=isDark?'block':'none';
  document.getElementById('ico-moon').style.display=isDark?'none':'block';
  document.getElementById('t-lbl').textContent=isDark?'Dark Mode':'Light Mode';
  rebuildAll();
}

// Build DOM
const app=document.getElementById('app');
ROWS.forEach(row=>{
  const{n,style,font,metric,name,sub,trend,up,icon}=row;
  const el=document.createElement('div');
  el.className=`dr d${n}`;
  el.innerHTML=`
    <span class="rl">Design ${String(n).padStart(2,'0')} &middot; ${style} &middot; ${font}</span>
    <div class="sc">
      <div class="ic">${ICONS[icon]}</div>
      <div class="lb">${name}</div>
      <div class="vl">${metric}</div>
      <div class="sb">${sub}</div>
      <div class="bd ${up?'bu':'bd2'}">${up?'▲':'▼'} ${trend}</div>
    </div>
    <div class="cb"><div class="ct">Bar &middot; Monthly</div><canvas id="bar-${n}"></canvas></div>
    <div class="cb"><div class="ct">Donut &middot; Share</div><canvas id="donut-${n}"></canvas></div>
    <div class="cb"><div class="ct">Pie &middot; Source</div><canvas id="pie-${n}"></canvas></div>
    <div class="cb"><div class="ct">Line &middot; Trend</div><canvas id="line-${n}"></canvas></div>`;
  app.appendChild(el);
});

requestAnimationFrame(()=>rebuildAll());
</script>
